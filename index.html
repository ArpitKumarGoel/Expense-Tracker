<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <h2>Expense Tracker</h2>
    <div class="container">
        <h4>Your Balance</h4>
        <h1 id="balance">$0.00</h1>
        <div class="inc-exp-container">
            <div>
                <h4>Income</h4>
                <p id="money-plus" class="money-plus">+$0.00</p>
            </div>
            <div>
                <h4>Expense</h4>
                <p id="money-minus" class="money-minus">-$0.00</p>
            </div>
        </div>
        <h3>History</h3>
        <ul id="list" class="list"></ul>
        <h3>Add New Transaction</h3>
        <form id="form">
            <div class="form-control">
                <label for="Text">Text</label>
                <input type="text" id="text" placeholder="Enter text..."autocomplete="off">
            </div>
            <div class="form-control">
                <label for="amount">Amount</label>
                <input type="number" id="amount" placeholder="Enter amount..."autocomplete="off">
            </div>
            <button class="btn">Add Transaction</button>
            <div style="text-align: center; margin-top: 30px; padding: 15px; border-top: 1px solid #ccc; font-family: Arial, sans-serif;">
    <p style="margin: 5px 0; color: #555;"><strong>Developed by:</strong> Arpit Kumar Goel</p>
    <p style="margin: 5px 0; color: #555;"><strong>Email:</strong> arpit.kumar.cse.2024@miet.ac.in</p>
    
    <a href="https://digitalheroesco.com" target="_blank" style="text-decoration: none;">
        <button style="margin-top: 10px; padding: 10px 20px; background-color: #000; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
            Built for Digital Heroes
        </button>
    </a>
</div>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
